version: '3.8'

# ============================================================
# 宝妈英语早操小程序 - 后端 Docker Compose 编排
# 包含: PostgreSQL + Redis + Django App + Nginx
# ============================================================

services:
  # PostgreSQL 数据库
  db:
    image: postgres:14-alpine
    container_name: mom-english-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mom_english}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql:ro
    ports:
      - "127.0.0.1:5432:5432"  # 仅暴露给宿主机
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mom-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: mom-english-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redis_pass_2026}"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mom-network

  # Django 应用
  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile
    container_name: mom-english-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_pass_2026}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - app_logs:/app/logs
      - app_media:/app/media
      - app_static:/app/staticfiles
    networks:
      - mom-network
    command: >
      bash -c "
        python manage.py migrate --noinput &&
        python manage.py collectstatic --noinput &&
        gunicorn mom_english_backend.wsgi:application
          --bind 0.0.0.0:8000
          --workers 3
          --worker-class sync
          --timeout 60
          --access-logfile -
          --error-logfile -
      "

  # Nginx 反向代理
  nginx:
    image: nginx:1.25-alpine
    container_name: mom-english-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - app_media:/var/www/media:ro
      - app_static:/var/www/static:ro
    depends_on:
      - web
    networks:
      - mom-network

volumes:
  postgres_data:
  redis_data:
  app_logs:
  app_media:
  app_static:

networks:
  mom-network:
    driver: bridge
